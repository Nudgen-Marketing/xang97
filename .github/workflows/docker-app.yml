name: Docker App

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  push:
    branches: ["main"]
    # Publish semver tags as releases.
    # tags: ["v*.*.*"]
    paths:
      [
        "src/**",
        "components/**",
        "public/**",
        "prisma/**",
        "data/**",
        "sanity/**",
        "proxy.ts",
        "Dockerfile",
        "package.json",
        "next.config.ts",
        ".github/workflows/docker-app.yml",
      ]
  # pull_request:
  #   branches: [ "main" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}-app

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Workaround: https://github.com/docker/build-push-action/issues/461
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,priority=1000

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_GOOGLE_MAP_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_ID }}
            NEXT_PUBLIC_GOOGLE_MAP_LANGUAGE=${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_LANGUAGE }}
            NEXT_PUBLIC_GOOGLE_MAP_REGION=${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_REGION }}
            NEXT_PUBLIC_MAP_ISSUE_URL=${{ secrets.NEXT_PUBLIC_MAP_ISSUE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy App to CapRover
        uses: caprover/deploy-from-github@main
        with:
          server: "${{ secrets.CAPROVER_HOST }}"
          app: "${{ secrets.CAPROVER_NEXT_APP }}"
          token: "${{ secrets.CAPROVER_NEXT_APP_TOKEN }}"
          image: "${{ steps.meta.outputs.tags }}"
