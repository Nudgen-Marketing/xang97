services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: a97_finder
      POSTGRES_USER: a97
      POSTGRES_PASSWORD: a97
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
